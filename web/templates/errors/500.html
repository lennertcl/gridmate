{% extends "layout.html" %}

{% block title %}Server Error - GridMate{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <div class="error-code">500</div>
        <h1>Server Error</h1>
        <p>Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('main.home') }}" class="btn btn-primary">Go to Home</a>
    </div>
</div>

<style>
    .error-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
    }

    .error-box {
        padding: 2rem;
    }

    .error-code {
        font-size: 5rem;
        font-weight: 700;
        color: var(--color-danger);
        margin-bottom: 1rem;
    }

    .error-box h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
    }

    .error-box p {
        color: var(--color-text-light);
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }
</style>
{% endblock %}
